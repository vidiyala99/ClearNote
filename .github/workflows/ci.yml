name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: clearnote_test
          POSTGRES_USER: clearnote
          POSTGRES_PASSWORD: clearnote
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run Ruff
        run: |
          cd backend
          npx ruff check . || ruff check .

      - name: Run Mypy
        run: |
          cd backend
          npx mypy app/ || mypy app/

      - name: Run Pytest
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
          POSTGRES_DB: clearnote_test
          POSTGRES_USER: clearnote
          POSTGRES_PASSWORD: clearnote
        run: |
          cd backend
          pytest tests/

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Typecheck
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Run Tests
        run: |
          cd frontend
          npx vitest run
